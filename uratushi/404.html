<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У Ратуши - Редирект</title>
    <script>
        // Редирект для GitHub Pages
        // Восстанавливаем путь после перезагрузки
        const path = window.location.pathname;
        const redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        
        if (redirect && redirect !== path) {
            window.location.replace(redirect);
        } else {
            // Если нет сохраненного редиректа, идем на главную
            window.location.replace('/uratushi/');
        }
    </script>
</head>
<body>
    <p>Идет перенаправление...</p>
</body>
</html>
